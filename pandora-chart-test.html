<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandora TradingView Test</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f7fafc;
            padding: 2rem;
        }
        .chart-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a365d;
            margin-bottom: 1rem;
        }
        .note {
            background: #ebf8ff;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #2d4a6f;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>Pandora A/S — Live Chart Test</h1>
        
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container">
            <div id="tradingview_pandora"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "width": "100%",
                    "height": 450,
                    "symbol": "OMXCOP:PNDORA",
                    "interval": "D",
                    "timezone": "Europe/Copenhagen",
                    "theme": "light",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview_pandora",
                    "hide_side_toolbar": false,
                    "studies": [],
                    "show_popup_button": true,
                    "popup_width": "1000",
                    "popup_height": "650"
                });
            </script>
        </div>
        <!-- TradingView Widget END -->
        
        <div class="note">
            <strong>4-Augen-Prinzip Check:</strong><br>
            ✓ Symbol: OMXCOP:PNDORA (Nasdaq Copenhagen)<br>
            ✓ Daten: Live von TradingView<br>
            ✓ Vergleich mit Yahoo Finance Screenshot: Kurs ~519 DKK
        </div>
    </div>
</body>
</html>
